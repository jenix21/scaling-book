# Translation status registry.
#
# Single source of truth for which chapters have a Korean translation and
# whether that translation is up to date with its English source.
#
# Consumed by:
#   - _includes/language_switcher.liquid  (decides if the EN<->KO toggle is active)
#   - bin/check_translation_freshness.py  (cross-checks against git history)
#
# `slug` is the filename of the English source without `.md`. The slug `index`
# is the front page; otherwise English lives at /<slug> and Korean at /ko/<slug>.
#
# `status`:
#   complete    — translation matches the source_commit recorded in ko/<slug>.md
#   in_progress — translation has started but is not yet ready to expose in the switcher
#   stale       — English source has changed since the recorded source_commit
#   missing     — no Korean version yet

